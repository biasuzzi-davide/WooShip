name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonarcloud:
    name: SonarCloud analysis
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate SonarCloud configuration
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
        run: |
          if [[ -z "$SONAR_TOKEN" || -z "$SONAR_ORGANIZATION" || -z "$SONAR_PROJECT_KEY" ]]; then
            echo "::error::Missing SonarCloud configuration. Set SONAR_TOKEN secret and SONAR_ORGANIZATION + SONAR_PROJECT_KEY repository variables."
            exit 1
          fi

      - name: Run SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=WooShip
            -Dsonar.sources=app,components,lib,middleware.ts
            -Dsonar.tests=lib
            -Dsonar.test.inclusions=**/*.test.ts
            -Dsonar.exclusions=**/*.d.ts,.next/**,node_modules/**,coverage/**
            -Dsonar.sourceEncoding=UTF-8
